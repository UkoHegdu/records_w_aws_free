# SonarCloud Configuration
sonar.projectKey=trackmania-record-tracker
sonar.organization=your-github-username

# Project Information
sonar.projectName=Trackmania Record Tracker
sonar.projectVersion=1.0.0

# Source Code
sonar.sources=terraform/lambda,frontend/src
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.test.js,**/*.spec.js,**/tests/**

# Test Coverage
sonar.javascript.lcov.reportPaths=terraform/lambda/tests/coverage/lcov.info,frontend/coverage/lcov.info

# Language Settings
sonar.javascript.file.suffixes=.js,.jsx,.ts,.tsx

# Quality Gate
sonar.qualitygate.wait=true
